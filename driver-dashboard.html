<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Driver Behavior Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f0f2f5;
      --surface:    #ffffff;
      --border:     #e8eaed;
      --text-1:     #0f1117;
      --text-2:     #5a6072;
      --text-3:     #9ba3b4;
      --blue:       #1d6ff3;
      --blue-bg:    #eaf0fe;
      --blue-text:  #1450b8;
      --green:      #17a35c;
      --green-bg:   #e6f7ef;
      --green-text: #0f7a42;
      --amber:      #d97706;
      --amber-bg:   #fef3e2;
      --amber-text: #b45309;
      --red:        #e2341d;
      --red-bg:     #feecea;
      --red-text:   #b91c1c;
      --purple:     #7c5cfc;
      --coral:      #f05a28;
      --radius:     10px;
      --shadow:     0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      font-size: 13px;
      line-height: 1.5;
      padding: 20px;
      min-height: 100vh;
    }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .header-left h1 { font-size: 17px; font-weight: 600; color: var(--text-1); letter-spacing: -0.2px; }
    .header-left p { font-size: 12px; color: var(--text-3); margin-top: 2px; }
    .btn { font-family: inherit; font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-2); cursor: pointer; box-shadow: var(--shadow); }
    .btn:hover { background: var(--bg); }

    #status-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 14px;
      color: var(--text-3);
      font-size: 13px;
      text-align: center;
    }

    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-box { display: none; background: var(--red-bg); border: 1px solid #fca5a5; border-radius: var(--radius); padding: 14px 18px; color: var(--red-text); margin-bottom: 20px; font-size: 13px; }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(148px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
    .kpi-label { font-size: 11px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .kpi-value { font-size: 26px; font-weight: 600; color: var(--text-1); line-height: 1; letter-spacing: -0.5px; }
    .kpi-delta { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 500; margin-top: 6px; padding: 2px 7px; border-radius: 99px; }
    .kpi-delta.pos { background: var(--green-bg); color: var(--green-text); }
    .kpi-delta.neg { background: var(--red-bg);   color: var(--red-text);   }
    .kpi-delta.neu { background: var(--bg);        color: var(--text-3);     }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }
    .panel-title { font-size: 13px; font-weight: 600; color: var(--text-1); }
    .panel-sub { font-size: 11px; color: var(--text-3); }

    .beh-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    .beh-row { display: flex; align-items: center; gap: 10px; }
    .beh-name { font-size: 12px; color: var(--text-2); width: 130px; flex-shrink: 0; }
    .beh-track { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .beh-fill { height: 100%; border-radius: 3px; }
    .beh-count { font-size: 12px; font-weight: 600; color: var(--text-1); width: 28px; text-align: right; flex-shrink: 0; }

    .score-ring-wrap { display: flex; align-items: center; justify-content: center; gap: 28px; padding: 20px 16px; flex-wrap: wrap; }
    .score-ring { position: relative; width: 96px; height: 96px; flex-shrink: 0; }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .score-ring-num { font-size: 22px; font-weight: 600; color: var(--text-1); line-height: 1; }

    .filter-row { display: flex; gap: 6px; padding: 0 0 14px; flex-wrap: wrap; }
    .chip { font-family: inherit; font-size: 12px; font-weight: 500; padding: 5px 13px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--text-2); cursor: pointer; box-shadow: var(--shadow); }
    .chip:hover { background: var(--bg); }
    .chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    .section-head { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th { background: #f8f9fb; padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
    tbody td { padding: 10px 12px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafbfd; }

    .driver-cell { display: flex; align-items: center; gap: 9px; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .driver-name { font-weight: 500; color: var(--text-1); }

    .pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 600; white-space: nowrap; }
    .pill-a { background: var(--green-bg); color: var(--green-text); }
    .pill-b { background: var(--blue-bg);  color: var(--blue-text);  }
    .pill-c { background: var(--amber-bg); color: var(--amber-text); }
    .pill-d { background: var(--red-bg);   color: var(--red-text);   }

    .t-pos  { color: var(--green); font-weight: 500; }
    .t-neg  { color: var(--red);   font-weight: 500; }
    .t-warn { color: var(--amber); font-weight: 600; }
    .t-mute { color: var(--text-3); }

    .cam-pill { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 99px; background: #f0f2f5; border: 1px solid var(--border); color: var(--text-2); }
    .no-results { text-align: center; padding: 36px; color: var(--text-3); font-size: 13px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <h1>Driver Behavior Dashboard</h1>
      <p id="header-sub">Initializing&hellip;</p>
    </div>
    <div>
      <button class="btn" onclick="reload()">&#8635;&nbsp;Refresh</button>
    </div>
  </div>

  <div id="error-box"></div>

  <div id="status-box">
    <div class="spinner"></div>
    <span id="status-msg">Connecting to MyGeotab&hellip;</span>
  </div>

  <div id="main" style="display:none;">
    <div class="kpi-grid" id="kpi-grid"></div>
    <div class="two-col">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Fleet score summary</span>
          <span class="panel-sub">30d &middot; prev mo &middot; YTD</span>
        </div>
        <div class="score-ring-wrap" id="score-rings"></div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Behavior breakdown</span>
          <span class="panel-sub">30-day event totals</span>
        </div>
        <div class="beh-list" id="beh-list"></div>
      </div>
    </div>
    <div class="section-head">Driver scorecard</div>
    <div class="filter-row">
      <button class="chip active" onclick="applyFilter('all',this)">All drivers</button>
      <button class="chip" onclick="applyFilter('risk',this)">At-risk only</button>
      <button class="chip" onclick="applyFilter('cam',this)">Camera events</button>
      <button class="chip" onclick="applyFilter('top',this)">Top performers</button>
      <button class="chip" onclick="applyFilter('improved',this)">Most improved</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:19%">Driver</th>
            <th style="width:8%">Score</th>
            <th style="width:10%">vs Prev Mo</th>
            <th style="width:9%">YTD avg</th>
            <th style="width:8%">vs YTD</th>
            <th style="width:7%">Miles</th>
            <th style="width:7%">Speeding</th>
            <th style="width:7%">Braking</th>
            <th style="width:7%">Accel</th>
            <th style="width:8%">Distract.</th>
            <th style="width:7%">Phone</th>
            <th style="width:8%">Camera</th>
          </tr>
        </thead>
        <tbody id="driver-tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="dashboard.js"></script>
  <script>
    var ALL_ROWS = [], ALL_FLEET = {}, API_REF = null;

    var AVATARS = [
      {bg:"#dbeafe",fg:"#1d4ed8"},{bg:"#dcfce7",fg:"#15803d"},
      {bg:"#fef9c3",fg:"#854d0e"},{bg:"#ede9fe",fg:"#6d28d9"},
      {bg:"#d1fae5",fg:"#065f46"},{bg:"#fee2e2",fg:"#991b1b"},
      {bg:"#fce7f3",fg:"#9d174d"},{bg:"#e0f2fe",fg:"#0369a1"}
    ];

    var BEHAVIORS = [
      {key:"Speeding",            label:"Speeding",          color:"#e2341d"},
      {key:"HarshBraking",        label:"Hard braking",      color:"#d97706"},
      {key:"HarshAcceleration",   label:"Hard acceleration", color:"#f05a28"},
      {key:"DistractedDriving",   label:"Distracted driving",color:"#7c5cfc"},
      {key:"HandheldCellphoneUse",label:"Phone use",         color:"#e2341d"},
      {key:"SeatbeltViolation",   label:"Seat belt",         color:"#9ba3b4"},
      {key:"HarshCornering",      label:"Hard cornering",    color:"#f05a28"},
      {key:"DriverFatigue",       label:"Driver fatigue",    color:"#991b1b"}
    ];

    // ── Detect environment and initialize ─────────────────
    function init() {
      // Inside MyGeotab — register the Add-In
      if (typeof geotab !== "undefined" && geotab.addin) {
        geotab.addin.DriverBehaviorDashboard = function() {
          return {
            initialize: function(api, state, cb) {
              API_REF = api;
              setStatus("Loading driver data\u2026");
              loadData(cb);
            },
            focus: function() {},
            blur:  function() {}
          };
        };
      } else {
        // Opened directly in browser — show helpful message
        setStatus("Open this dashboard through your MyGeotab Add-In menu.");
        document.getElementById("status-box").querySelector(".spinner").style.display = "none";
      }
    }

    function setStatus(msg) {
      document.getElementById("status-msg").textContent = msg;
    }

    // ── Load data ─────────────────────────────────────────
    function loadData(cb) {
      document.getElementById("status-box").style.display = "flex";
      document.getElementById("main").style.display = "none";
      document.getElementById("error-box").style.display = "none";
      document.getElementById("header-sub").textContent = "Loading\u2026";

      runDashboard(API_REF, function(rows, fleet) {
        ALL_ROWS = rows;
        ALL_FLEET = fleet;
        renderKPIs(fleet);
        renderScoreRings(fleet);
        renderBehaviors(rows);
        renderTable(rows);
        document.getElementById("status-box").style.display = "none";
        document.getElementById("main").style.display = "block";
        document.getElementById("header-sub").textContent =
          "Last 30 days \u00b7 " + fleet.driverCount + " active drivers \u00b7 Updated " + timestamp();
        if (cb) { cb(); }
      }, function(err) {
        document.getElementById("status-box").style.display = "none";
        var el = document.getElementById("error-box");
        el.style.display = "block";
        el.textContent = "Error loading data: " + err;
        if (cb) { cb(); }
      });
    }

    function reload() {
      if (API_REF) { loadData(null); }
    }

    function timestamp() {
      return new Date().toLocaleString("en-US", {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
    }

    // ── KPI cards ─────────────────────────────────────────
    function renderKPIs(f) {
      var prevPos = parseFloat(f.changePrev) >= 0;
      var ytdPos  = parseFloat(f.changeYtd)  >= 0;
      var incPos  = parseFloat(f.incidentsChange) <= 0;
      var cards = [
        {label:"Fleet score",      value:f.score30,      delta:f.changePrev,         pos:prevPos, hasDelta:true},
        {label:"Prev month avg",   value:f.scorePrev,    delta:null,                 pos:true,    hasDelta:false},
        {label:"YTD average",      value:f.scoreYtd,     delta:f.changeYtd,          pos:ytdPos,  hasDelta:true},
        {label:"Incidents (30d)",  value:f.incidents30,  delta:f.incidentsChange,    pos:incPos,  hasDelta:true},
        {label:"Camera events",    value:f.cameraEvents, delta:null,                 pos:true,    hasDelta:false},
        {label:"Active drivers",   value:f.driverCount,  delta:null,                 pos:true,    hasDelta:false}
      ];
      var html = "", i, c, dc;
      for (i = 0; i < cards.length; i++) {
        c  = cards[i];
        dc = c.hasDelta ? (c.pos ? "pos" : "neg") : "neu";
        html += '<div class="kpi-card">' +
          '<div class="kpi-label">' + c.label + '</div>' +
          '<div class="kpi-value">' + c.value + '</div>' +
          (c.hasDelta
            ? '<div class="kpi-delta ' + dc + '">' + (c.pos ? "&#9650;" : "&#9660;") + ' ' + c.delta + ' vs prev</div>'
            : '<div class="kpi-delta neu">&mdash;</div>') +
          '</div>';
      }
      document.getElementById("kpi-grid").innerHTML = html;
    }

    // ── Score rings ───────────────────────────────────────
    function renderScoreRings(f) {
      var scores = [
        {label:"30-day",  value:f.score30,   color:"#1d6ff3"},
        {label:"Prev mo", value:f.scorePrev, color:"#9ba3b4"},
        {label:"YTD",     value:f.scoreYtd,  color:"#17a35c"}
      ];
      var R = 40, C = 48, stroke = 8;
      var circ = 2 * Math.PI * R;
      var html = "", i, s, dash, gap;
      for (i = 0; i < scores.length; i++) {
        s    = scores[i];
        dash = (s.value / 100) * circ;
        gap  = circ - dash;
        html +=
          '<div style="display:flex;flex-direction:column;align-items:center;gap:6px;">' +
          '<div class="score-ring">' +
            '<svg width="96" height="96" viewBox="0 0 96 96">' +
              '<circle cx="'+C+'" cy="'+C+'" r="'+R+'" fill="none" stroke="#f0f2f5" stroke-width="'+stroke+'"/>' +
              '<circle cx="'+C+'" cy="'+C+'" r="'+R+'" fill="none" stroke="'+s.color+'" stroke-width="'+stroke+'" ' +
                'stroke-dasharray="'+dash.toFixed(1)+' '+gap.toFixed(1)+'" stroke-linecap="round"/>' +
            '</svg>' +
            '<div class="score-ring-label"><div class="score-ring-num">'+s.value+'</div></div>' +
          '</div>' +
          '<div style="font-size:11px;color:var(--text-3);font-weight:500;">'+s.label+'</div>' +
          '</div>';
      }
      document.getElementById("score-rings").innerHTML = html;
    }

    // ── Behavior bars ─────────────────────────────────────
    function renderBehaviors(rows) {
      var totals = {}, i, r;
      for (i = 0; i < BEHAVIORS.length; i++) { totals[BEHAVIORS[i].key] = 0; }
      for (i = 0; i < rows.length; i++) {
        r = rows[i];
        totals["Speeding"]             += r.Speeding    || 0;
        totals["HarshBraking"]         += r.Braking     || 0;
        totals["HarshAcceleration"]    += r.Accel       || 0;
        totals["DistractedDriving"]    += r.Distraction || 0;
        totals["HandheldCellphoneUse"] += r.Phone       || 0;
      }
      var counts = [], m, pct;
      for (i = 0; i < BEHAVIORS.length; i++) { counts.push(totals[BEHAVIORS[i].key] || 0); }
      var maxVal = Math.max.apply(null, counts.concat([1]));
      var html = "";
      for (i = 0; i < BEHAVIORS.length; i++) {
        m   = BEHAVIORS[i];
        pct = Math.round((counts[i] / maxVal) * 100);
        html +=
          '<div class="beh-row">' +
            '<div class="beh-name">' + m.label + '</div>' +
            '<div class="beh-track"><div class="beh-fill" style="width:'+pct+'%;background:'+m.color+'"></div></div>' +
            '<div class="beh-count">' + counts[i] + '</div>' +
          '</div>';
      }
      document.getElementById("beh-list").innerHTML = html;
    }

    // ── Driver table ──────────────────────────────────────
    function renderTable(rows) {
      if (!rows.length) {
        document.getElementById("driver-tbody").innerHTML =
          '<tr><td colspan="12" class="no-results">No drivers match this filter.</td></tr>';
        return;
      }
      var html = "", i, r, av, ini, pc, yc, camHtml;
      function pillFor(g) { return {A:"pill-a",B:"pill-b",C:"pill-c",D:"pill-d"}[g]||"pill-d"; }
      for (i = 0; i < rows.length; i++) {
        r   = rows[i];
        av  = AVATARS[i % AVATARS.length];
        ini = r.Name.split(" ").map(function(w){return w.charAt(0);}).join("").slice(0,2).toUpperCase();
        pc  = r.vsPrevMo.charAt(0) === "+" ? "t-pos" : "t-neg";
        yc  = r.vsYTD.charAt(0)   === "+" ? "t-pos" : "t-neg";
        camHtml = r.Camera > 0
          ? '<span class="cam-pill">'+r.Camera+' flag'+(r.Camera>1?"s":"")+'</span>'
          : '<span class="t-mute">&mdash;</span>';
        html +=
          "<tr>" +
          "<td><div class='driver-cell'>" +
            "<div class='avatar' style='background:"+av.bg+";color:"+av.fg+"'>"+ini+"</div>" +
            "<span class='driver-name'>"+r.Name+"</span></div></td>" +
          "<td><span class='pill "+pillFor(r.Grade)+"'>"+r.Score+"</span></td>" +
          "<td class='"+pc+"'>"+r.vsPrevMo+"</td>" +
          "<td>"+r.YTD+"</td>" +
          "<td class='"+yc+"'>"+r.vsYTD+"</td>" +
          "<td>"+r.Miles+"</td>" +
          "<td class='"+(r.Speeding>8?"t-warn":"")+"'>"+r.Speeding+"</td>" +
          "<td class='"+(r.Braking>8?"t-warn":"")+"'>"+r.Braking+"</td>" +
          "<td>"+r.Accel+"</td>" +
          "<td class='"+(r.Distraction>4?"t-warn":"")+"'>"+r.Distraction+"</td>" +
          "<td>"+r.Phone+"</td>" +
          "<td>"+camHtml+"</td>" +
          "</tr>";
      }
      document.getElementById("driver-tbody").innerHTML = html;
    }

    // ── Filters ───────────────────────────────────────────
    function applyFilter(type, btn) {
      var btns = document.querySelectorAll(".chip"), i;
      for (i = 0; i < btns.length; i++) { btns[i].classList.remove("active"); }
      btn.classList.add("active");
      var f = ALL_ROWS;
      if (type==="risk")     { f = ALL_ROWS.filter(function(r){return r.Grade==="D";}); }
      if (type==="cam")      { f = ALL_ROWS.filter(function(r){return r.Camera>0;}); }
      if (type==="top")      { f = ALL_ROWS.filter(function(r){return r.Score>=85;}); }
      if (type==="improved") { f = ALL_ROWS.filter(function(r){return parseInt(r.vsPrevMo,10)>0;}); }
      renderTable(f);
    }

    // ── Start ─────────────────────────────────────────────
    init();
  </script>
</body>
</html>
