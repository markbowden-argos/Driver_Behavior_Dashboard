<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Upload Test</title>
<style>
  body { background: #1e40af; color: white; font-family: sans-serif; margin: 0; padding: 40px; }
  .box { background: white; color: #1e40af; padding: 30px; border-radius: 12px; max-width: 500px; margin: 0 auto; }
  h1 { margin: 0 0 10px 0; font-size: 28px; }
  .badge { display: inline-block; background: #16a34a; color: white; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; }
</style>
</head>
<body>
<div class="box">
  <h1>Upload Test Page</h1>
  <p>If you can see this styled page with a blue background and white card, GitHub Pages is working correctly.</p>
  <p><span class="badge">VERSION 1</span></p>
  <p id="timestamp"></p>
</div>
<script>
  document.getElementById('timestamp').innerText = 'Page loaded at: ' + new Date().toLocaleString();
</script>
</body>
</html>
