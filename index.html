<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Driver Behavior Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f7f8fa;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #e4e6ea;
      border-radius: 8px;
      padding: 40px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: #1a6eb5;
      border-radius: 12px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 30px;
      height: 30px;
      fill: #fff;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #222;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .divider {
      border: none;
      border-top: 1px solid #e4e6ea;
      margin: 24px 0;
    }

    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
      margin-bottom: 8px;
    }

    .url {
      font-family: monospace;
      font-size: 12px;
      background: #f5f6f8;
      border: 1px solid #e4e6ea;
      border-radius: 4px;
      padding: 8px 12px;
      color: #444;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
      </svg>
    </div>

    <h1>Driver Behavior Dashboard</h1>
    <p>This is a MyGeotab Add-In hosted on GitHub Pages.</p>
    <p>The dashboard is accessed through your MyGeotab account, not directly through this page.</p>

    <hr class="divider">

    <div class="label">Add-In URL</div>
    <div class="url">https://markbowden-argos.github.io/Driver_Behavior_Dashboard/dashboard.html</div>

  </div>
</body>
</html>
